      <rect x="0" y="0" width="1" height="1" fill="#ffffff" opacity="0.18"/>
      <rect x="4" y="1" width="1" height="1" fill="#ffffff" opacity="0.1"/>
      <rect x="2" y="5" width="1" height="1" fill="#ffffff" opacity="0.12"/>
      <rect x="6" y="6" width="1" height="1" fill="#ffffff" opacity="0.08"/>
    </pattern>
    <pattern id="scanlines" width="1" height="6" patternUnits="userSpaceOnUse">
      <rect width="1" height="6" fill="none"/>
      <rect y="0" width="1" height="2" fill="#000000" opacity="0.09"/>
