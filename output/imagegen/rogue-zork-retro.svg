    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b4058"/>
      <stop offset="45%" stop-color="#262b3e"/>
      <stop offset="100%" stop-color="#101421"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd86b"/>
      <stop offset="100%" stop-color="#ff9b31"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8affc1"/>
      <stop offset="100%" stop-color="#12c27a"/>
    </linearGradient>
    <linearGradient id="cloak" x1="0" y1="0" x2="1" y2="1">
